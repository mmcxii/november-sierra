name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci-required:
    name: CI Required
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'e2e/**'
              - 'scripts/**'
              - 'drizzle/**'
              - '**/*.config.*'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'eslint/**'
              - 'vercel.json'
              - 'components.json'
              - '.github/workflows/**'

  ci:
    name: Typecheck, Lint, Test
    runs-on: ubuntu-latest
    needs: ci-required
    if: needs.ci-required.outputs.code == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [ci-required, ci]
    # Dependabot PRs can't access secrets — E2E runs post-merge instead
    # (see e2e-dependabot.yml)
    if: ${{ github.actor != 'dependabot[bot]' && needs.ci-required.outputs.code == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull env from Vercel (anchr-stage preview)
        run: npx vercel env pull .env.local --environment preview --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGE }}

      - name: Compute Neon branch expiration
        run: echo "NEON_BRANCH_EXPIRES=$(date -u -d '+4 hours' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon branch for E2E
        id: neon-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_name: e2e/ci-${{ github.run_id }}
          username: neondb_owner
          database: neondb
          # Safety net: auto-delete if the cleanup step is skipped (e.g. runner crash)
          expires_at: ${{ env.NEON_BRANCH_EXPIRES }}

      - name: Apply schema to Neon branch
        # --force skips confirmation prompts for destructive changes (CI is non-interactive)
        # Source .env.local (from Vercel pull) for envSchema validation, but override DATABASE_URL
        run: |
          set -a && source .env.local && set +a
          export DATABASE_URL="${{ steps.neon-branch.outputs.db_url }}"
          pnpm db:push --force

      - name: Remove staging DATABASE_URL from .env.local
        run: sed -i '/^DATABASE_URL=/d' .env.local

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url_pooled }}
          E2E_USER_PASSWORD: e2e-test-password-ephemeral
          E2E_RUN_ID: ${{ github.run_id }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Delete Neon branch
        if: ${{ always() }}
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch: e2e/ci-${{ github.run_id }}
