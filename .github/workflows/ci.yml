name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci-required:
    name: CI Required
    runs-on: ubuntu-latest
    outputs:
      anchr-website: ${{ steps.filter.outputs.anchr-website }}
      ns-website: ${{ steps.filter.outputs.ns-website }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            anchr-website:
              - 'anchr/website/**'
            ns-website:
              - 'november-sierra/website/**'
            code:
              - 'anchr/**'
              - 'november-sierra/**'
              - 'shared/**'
              - 'scripts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
              - '.github/workflows/**'

  ci:
    name: Typecheck, Lint, Test
    runs-on: ubuntu-latest
    needs: ci-required
    if: needs.ci-required.outputs.code == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate schema ↔ migration sync
        if: needs.ci-required.outputs.anchr-website == 'true'
        run: |
          SCHEMA=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'anchr/website/src/lib/db/schema/')
          MIGRATIONS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'anchr/website/drizzle/*.sql')
          if [ -n "$SCHEMA" ] && [ -z "$MIGRATIONS" ]; then
            echo "::error::Schema files changed without a migration. Run 'pnpm drizzle-kit generate'."
            echo "$SCHEMA"
            exit 1
          fi
          if [ -n "$MIGRATIONS" ] && [ -z "$SCHEMA" ]; then
            echo "::error::Migration files changed without a schema change."
            echo "$MIGRATIONS"
            exit 1
          fi

      - name: Verify migrations match schema (drizzle-kit check)
        if: needs.ci-required.outputs.anchr-website == 'true'
        working-directory: anchr/website
        run: pnpm db:check

      - name: Lint migrations for destructive operations
        if: needs.ci-required.outputs.anchr-website == 'true'
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'anchr/website/drizzle/*.sql')
          # Filter out files whose content already exists on the base branch (e.g. relocated files)
          NEW_FILES=""
          for f in $CHANGED; do
            HASH=$(git hash-object "$f")
            if ! git ls-tree -r "origin/${{ github.base_ref }}" | grep -q "$HASH"; then
              NEW_FILES="$NEW_FILES $f"
            fi
          done
          if [ -n "$NEW_FILES" ]; then
            echo "$NEW_FILES" | xargs node --no-warnings --experimental-strip-types scripts/lint-migrations.ts anchr/website
          else
            echo "No new or modified migration files — skipping."
          fi

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Lint
        run: pnpm turbo run lint

      - name: Test
        run: pnpm turbo run test

  build-anchr-website:
    name: Validate Build (Anchr)
    runs-on: ubuntu-latest
    needs: ci-required
    if: needs.ci-required.outputs.anchr-website == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate build and start
        working-directory: anchr/website
        run: bash ../../scripts/validate-build.sh

  build-ns-website:
    name: Validate Build (NS Website)
    runs-on: ubuntu-latest
    needs: ci-required
    if: needs.ci-required.outputs.ns-website == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate build and start
        working-directory: november-sierra/website
        run: bash ../../scripts/validate-build-ns-website.sh

  e2e-ns-website:
    name: E2E Tests (NS Website)
    runs-on: ubuntu-latest
    needs: [ci-required, ci]
    if: needs.ci-required.outputs.ns-website == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: november-sierra/website
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E smoke tests
        working-directory: november-sierra/website
        run: pnpm test:e2e
        env:
          NEXT_PUBLIC_APP_URL: "https://novembersierra.dev"
          RESEND_API_KEY: "re_mock"
          CONTACT_EMAIL_TO: "mock@example.com"
          CONTACT_EMAIL_FROM: "mock@example.com"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: ns-website-playwright-report
          path: november-sierra/website/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: ns-website-test-results
          path: november-sierra/website/test-results/
          retention-days: 30

  e2e-anchr-website:
    name: E2E Tests (Anchr)
    runs-on: ubuntu-latest
    needs: [ci-required, ci]
    # Dependabot PRs can't access secrets — E2E runs post-merge instead
    # (see e2e-dependabot.yml)
    if: ${{ github.actor != 'dependabot[bot]' && needs.ci-required.outputs.anchr-website == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull env from Vercel (anchr-stage preview)
        working-directory: anchr/website
        run: npx vercel env pull .env.local --environment preview --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_ANCHR_WEBSITE_STAGE }}

      - name: Compute Neon branch expiration
        run: echo "NEON_BRANCH_EXPIRES=$(date -u -d '+4 hours' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon branch for E2E
        id: neon-branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID_ANCHR }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch_name: e2e/ci-${{ github.run_id }}
          role: neondb_owner
          database: neondb
          # Safety net: auto-delete if the cleanup step is skipped (e.g. runner crash)
          expires_at: ${{ env.NEON_BRANCH_EXPIRES }}

      - name: Apply schema to Neon branch
        # --force skips confirmation prompts for destructive changes (CI is non-interactive)
        # Source .env.local (from Vercel pull) for envSchema validation, but override DATABASE_URL
        working-directory: anchr/website
        run: |
          set -a && source .env.local && set +a
          export DATABASE_URL="${{ steps.neon-branch.outputs.db_url }}"
          pnpm db:push --force

      - name: Remove staging DATABASE_URL from .env.local
        working-directory: anchr/website
        run: sed -i '/^DATABASE_URL=/d' .env.local

      - name: Install Playwright browsers
        working-directory: anchr/website
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: anchr/website
        run: pnpm test:e2e
        env:
          DATABASE_URL: ${{ steps.neon-branch.outputs.db_url_pooled }}
          E2E_USER_PASSWORD: e2e-test-password-ephemeral
          E2E_RUN_ID: ${{ github.run_id }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          WEBHOOK_SIGNING_ENCRYPTION_KEY: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: anchr/website/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: anchr/website/test-results/
          retention-days: 30

      - name: Delete Neon branch
        if: ${{ always() }}
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID_ANCHR }}
          api_key: ${{ secrets.NEON_API_KEY }}
          branch: e2e/ci-${{ github.run_id }}
