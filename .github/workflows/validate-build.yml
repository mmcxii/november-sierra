name: Validate Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci-required:
    name: CI Required
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'e2e/**'
              - 'scripts/**'
              - 'drizzle/**'
              - '**/*.config.*'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'eslint/**'
              - 'vercel.json'
              - 'components.json'
              - '.github/workflows/**'

  validate-build:
    name: Build & Start
    runs-on: ubuntu-latest
    needs: ci-required
    if: needs.ci-required.outputs.code == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate build and start
        run: bash scripts/validate-build.sh
