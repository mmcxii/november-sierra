name: Validate Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-build:
    name: Build & Start
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate build and start
        run: bash scripts/validate-build.sh
