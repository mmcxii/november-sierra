version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ANC-132: chore(deps)"
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    reviewers:
      - mmcxii

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ANC-132: chore(deps)"
    reviewers:
      - mmcxii
